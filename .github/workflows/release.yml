name: Build & Release Theme

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    name: Build theme zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_name=katalyst-theme-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          ZIP_NAME="${{ steps.version.outputs.zip_name }}"
          # Build from repo root, exclude dev/CI artifacts
          zip -r "${ZIP_NAME}" . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude ".sisyphus/*" \
            --exclude "AGENTS.md" \
            --exclude "KATALYST Landing.html" \
            --exclude "KATALYST Wireframes.html" \
            --exclude "uploads/*" \
            --exclude "tools/*" \
            --exclude "*.zip"
          echo "Built: ${ZIP_NAME}"
          unzip -l "${ZIP_NAME}" | tail -5

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: ${{ steps.version.outputs.zip_name }}
          retention-days: 30

      # ── Release (tags only) ──────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.zip_name }}
          generate_release_notes: true
