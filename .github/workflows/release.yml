name: Build & Release Theme

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build theme zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_name=katalyst-theme-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          ZIP_NAME="${{ steps.version.outputs.zip_name }}"
          THEME_DIR="katalyst"

          mkdir -p "${THEME_DIR}"
          rsync -a \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".gitignore" \
            --exclude=".sisyphus" \
            --exclude="AGENTS.md" \
            --exclude="KATALYST Landing.html" \
            --exclude="KATALYST Wireframes.html" \
            --exclude="uploads" \
            --exclude="tools" \
            --exclude="reseed-homepage.php" \
            --exclude="${THEME_DIR}" \
            --exclude="*.zip" \
            . "${THEME_DIR}/"

          zip -r "${ZIP_NAME}" "${THEME_DIR}"
          echo "Built: ${ZIP_NAME}"
          echo "--- Top-level entries in zip ---"
          unzip -l "${ZIP_NAME}" | grep -E "^\s+[0-9]" | head -20

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: ${{ steps.version.outputs.zip_name }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.zip_name }}
          generate_release_notes: true
